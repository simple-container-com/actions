name: 'Post PR Comment from Artifact'
description: 'Download a pre-rendered comment artifact from an upstream workflow_run and post or update a sticky PR comment via gh CLI. Privileged step — never reads PR code. The PR number and the comment marker are caller-controlled inputs and are NEVER read from the artifact.'

inputs:
  workflow-run-id:
    description: 'ID of the upstream workflow run that uploaded the comment artifact.'
    required: true
  github-token:
    description: 'GITHUB_TOKEN with pull-requests:write and actions:read.'
    required: true
  pr-number:
    description: 'PR number to comment on. The caller workflow MUST derive this from the trusted workflow_run event (github.event.workflow_run.pull_requests[0].number, with API fallback for fork PRs) — never from the artifact.'
    required: true
  artifact-name:
    description: 'Name of the artifact uploaded by the upstream workflow.'
    required: false
    default: 'pr-comment-body'
  marker:
    description: 'Marker string used to find an existing sticky comment to update. Caller-controlled (hardcoded per workflow). The artifact never overrides it.'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Download PR comment artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: pr-comment
        run-id: ${{ inputs.workflow-run-id }}
        github-token: ${{ inputs.github-token }}

    - name: Post or update PR comment
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        MARKER: ${{ inputs.marker }}
        PR_NUMBER: ${{ inputs.pr-number }}
        ARTIFACT_DIR: ${{ github.workspace }}/pr-comment
      run: ${{ github.action_path }}/post.sh
