name: 'Build Semgrep PR Comment Body'
description: 'Render the Semgrep-scan PR comment markdown into an artifact-ready file. Does NOT post the comment.'

inputs:
  product-name:
    description: 'Product name shown in the comment header. Defaults to the calling repository name.'
    required: false
    default: ''
  scan-result:
    description: 'GitHub Actions result of the semgrep-scan job (success / failure / cancelled / skipped).'
    required: true
  errors:
    required: false
    default: '0'
  warnings:
    required: false
    default: '0'
  infos:
    required: false
    default: '0'
  total:
    required: false
    default: '0'

runs:
  using: 'composite'
  steps:
    - name: Render comment body
      shell: bash
      env:
        PRODUCT_NAME_INPUT: ${{ inputs.product-name }}
        DEFAULT_PRODUCT_NAME: ${{ github.event.repository.name }}
        GIT_SHA: ${{ github.sha }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        SCAN_RESULT: ${{ inputs.scan-result }}
        ERRORS: ${{ inputs.errors }}
        WARNINGS: ${{ inputs.warnings }}
        INFOS: ${{ inputs.infos }}
        TOTAL: ${{ inputs.total }}
      run: ${{ github.action_path }}/build.sh

    - name: Upload Semgrep PR comment artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: pr-comment-body-semgrep
        path: ${{ runner.temp }}/pr-comment-semgrep
        retention-days: 1
        if-no-files-found: error
