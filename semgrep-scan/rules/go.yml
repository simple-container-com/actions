rules:
  # ====================================================================
  # 1. tls.Config{InsecureSkipVerify: true} — disables TLS server-cert
  #    verification, MITM-trivial. Allowed in *_test.go (testing TLS
  #    setup is normal); ERROR everywhere else.
  # ====================================================================
  - id: go-tls-insecure-skip-verify
    languages: [go]
    severity: ERROR
    message: >-
      `tls.Config{InsecureSkipVerify: true}` disables TLS certificate
      verification — any active network attacker can MITM the connection.
      Pin the expected server certificate / CA via `RootCAs`, or rely on
      the system trust store. If you genuinely need to skip (rare,
      explainable), use `crypto/tls`'s `VerifyConnection` for a custom
      check rather than disabling all verification.
    # Listing both `&tls.Config{...}` and bare `tls.Config{...}`
    # produced duplicate findings on a single site because the
    # bare-form pattern also matches the composite literal nested
    # inside `&`. Bare-form (value, never addressed) is also vanishingly
    # rare — only the pointer form is needed.
    pattern: |
      &tls.Config{
        ...,
        InsecureSkipVerify: true,
        ...,
      }
    paths:
      include:
        - "**/*.go"
      exclude:
        - "**/*_test.go"
    metadata:
      category: security
      cwe: "CWE-295: Improper Certificate Validation"
      owasp: "A07:2021 - Identification and Authentication Failures"

  # ====================================================================
  # 2. math/rand for security-relevant variable names. We can't trace
  #    data-flow into TLS / token-issuance APIs from a regex pattern,
  #    so we approximate via the destination variable's name. False-
  #    positives are low because variables called `token`, `secret`,
  #    `apikey`, etc. are almost never assigned non-cryptographic random.
  # ====================================================================
  - id: go-math-rand-for-security
    languages: [go]
    severity: WARNING
    message: >-
      `math/rand` is NOT cryptographically secure (it's a deterministic
      PRNG seeded from time). Use `crypto/rand` for tokens, secrets,
      session IDs, OTPs, or anything an attacker shouldn't predict.
    patterns:
      - pattern-either:
          - pattern: $X = rand.$F(...)
          - pattern: $X := rand.$F(...)
      - metavariable-regex:
          metavariable: $X
          regex: '(?i)(token|secret|password|passwd|apikey|api_key|nonce|salt|csrf|session|otp|seed|uuid|signing|signature)'
      # Require the file to import `math/rand`. Without this gate, a
      # project that only imports `crypto/rand` and writes the
      # perfectly-secure `token, _ := rand.Int(rand.Reader, max)`
      # would still match the `rand.$F(...)` pattern above and get
      # incorrectly flagged.
      - pattern-either:
          - pattern-inside: |
              import "math/rand"
              ...
          - pattern-inside: |
              import (
                ...
                "math/rand"
                ...
              )
              ...
      # Exclude the crypto/rand call shape: `rand.Int(rand.Reader, ...)`
      # / `rand.Read(...)` / `rand.Prime(rand.Reader, ...)`. crypto/rand
      # always passes its `rand.Reader` as the first argument, while
      # math/rand never does. This catches the mixed-import case where
      # both `math/rand` AND `crypto/rand` are imported (one under an
      # alias) and the actual call is the crypto path.
      - pattern-not: $X = rand.$F(rand.Reader, ...)
      - pattern-not: $X := rand.$F(rand.Reader, ...)
    paths:
      include:
        - "**/*.go"
      exclude:
        - "**/*_test.go"
    metadata:
      category: security
      cwe: "CWE-338: Use of Cryptographically Weak PRNG"

  # ====================================================================
  # 3. SQL query built by string concatenation — classic SQLi vector.
  #    Restricted to obvious cases on `Query` / `Exec` family methods
  #    receiving a string + variable. Parameterised queries (`?`/`$1`)
  #    pass the string literal verbatim and bind via varargs — those
  #    don't match.
  # ====================================================================
  - id: go-sql-query-string-concat
    languages: [go]
    severity: ERROR
    message: >-
      Building a SQL query by `+`-concatenation is SQL injection. Use
      parameterised queries: `db.Query("... WHERE x = ?", x)` or
      `db.QueryContext(ctx, "... WHERE x = $1", x)`. Most Go SQL
      libraries do binding for you when you pass parameters separately.
    patterns:
      - pattern-either:
          - pattern: $DB.Query($Q + $X, ...)
          - pattern: $DB.Query($X + $Q, ...)
          - pattern: $DB.QueryContext($CTX, $Q + $X, ...)
          - pattern: $DB.QueryContext($CTX, $X + $Q, ...)
          - pattern: $DB.Exec($Q + $X, ...)
          - pattern: $DB.Exec($X + $Q, ...)
          - pattern: $DB.ExecContext($CTX, $Q + $X, ...)
          - pattern: $DB.ExecContext($CTX, $X + $Q, ...)
      # Splitting a long SQL string across two literals for readability
      # (`db.Query("SELECT a, b " + "FROM foo")`) is benign — no
      # attacker-controlled fragment. Reject the pure literal+literal
      # form so we don't fire ERROR-severity SQLi on it.
      - pattern-not: $DB.Query("..." + "...", ...)
      - pattern-not: $DB.QueryContext($CTX, "..." + "...", ...)
      - pattern-not: $DB.Exec("..." + "...", ...)
      - pattern-not: $DB.ExecContext($CTX, "..." + "...", ...)
    paths:
      include:
        - "**/*.go"
      exclude:
        - "**/*_test.go"
    metadata:
      category: security
      cwe: "CWE-89: SQL Injection"
      owasp: "A03:2021 - Injection"

  # ====================================================================
  # 4. RSA key size below 2048. NIST has been recommending ≥2048 since
  #    SP 800-131A; 1024-bit RSA is considered factor-able by sufficiently
  #    motivated attackers.
  # ====================================================================
  - id: go-rsa-weak-key-size
    languages: [go]
    severity: ERROR
    message: >-
      RSA keys smaller than 2048 bits do not meet NIST SP 800-131A
      guidance. Use 2048 or 3072 bits. Prefer Ed25519 (constant-time,
      smaller keys) for new systems.
    pattern-either:
      - pattern: rsa.GenerateKey($RAND, 512)
      - pattern: rsa.GenerateKey($RAND, 1024)
    paths:
      include:
        - "**/*.go"
    metadata:
      category: security
      cwe: "CWE-326: Inadequate Encryption Strength"

  # ====================================================================
  # 5. Deprecated symmetric ciphers — DES, 3DES, RC4 — used as
  #    block-cipher constructors. (MD5 / SHA-1 are intentionally NOT
  #    flagged here because they are still legitimate for non-security
  #    use cases like checksums and content-addressing; flagging them
  #    everywhere is too noisy. A separate, narrower rule keyed off
  #    `crypto/hmac` or signing usage would be the right home.)
  # ====================================================================
  - id: go-deprecated-cipher
    languages: [go]
    severity: ERROR
    message: >-
      DES / 3DES / RC4 are broken or deprecated for confidentiality
      protection. Use AES-GCM (`crypto/cipher.NewGCM`) or
      ChaCha20-Poly1305 for AEAD. If you need a stream cipher, ChaCha20
      is the correct choice.
    pattern-either:
      - pattern: des.NewCipher(...)
      - pattern: des.NewTripleDESCipher(...)
      - pattern: rc4.NewCipher(...)
    paths:
      include:
        - "**/*.go"
    metadata:
      category: security
      cwe: "CWE-327: Use of Broken or Risky Cryptographic Algorithm"

  # ====================================================================
  # 6. Pulumi AWS — RDS instance / Aurora cluster without
  #    StorageEncrypted. AWS RDS defaults to UNENCRYPTED storage at
  #    rest unless `StorageEncrypted: pulumi.Bool(true)` is set in
  #    InstanceArgs / ClusterArgs. CIS AWS Foundations Benchmark RDS.3
  #    requires encryption-at-rest. Encryption is also a one-shot
  #    decision: it cannot be enabled on an existing instance without
  #    snapshot-restore. Add the field at creation, ideally with a
  #    customer-managed `KmsKeyId`.
  # ====================================================================
  - id: go-aws-rds-no-storage-encryption
    languages: [go]
    severity: ERROR
    message: >-
      AWS RDS / Aurora resources default to UNENCRYPTED storage unless
      `StorageEncrypted: pulumi.Bool(true)` is set on creation
      (CIS AWS Foundations RDS.3). Encryption cannot be enabled on
      an existing instance without a snapshot-restore — set it at
      creation time, ideally with a customer-managed `KmsKeyId`.
    patterns:
      - pattern-either:
          - pattern: rds.NewInstance(...)
          - pattern: rds.NewCluster(...)
      # Suppress when `StorageEncrypted` is set in a way that is NOT a
      # static-disable. Three accepted shapes:
      #   * `StorageEncrypted: pulumi.Bool(true)` / `sdk.Bool(true)` /
      #     any `.Bool(true)` — the canonical Pulumi truthy shape.
      #   * bare `StorageEncrypted: true`.
      #   * `StorageEncrypted: <ptr>.Bool(lo.FromPtr(<*bool expr>))` —
      #     a runtime-config opt-in: value is config-driven (nil →
      #     legacy default, explicit value otherwise) and is paired
      #     with `IgnoreChanges([]string{"storageEncrypted"})` on the
      #     resource opts so flipping the bit later doesn't trigger
      #     destructive replacement of pre-existing unencrypted
      #     instances. The pairing isn't verified in regex; the
      #     wrapper shape is the design signal.
      # Setting the field to `false` (literal) or `Bool(false)` still
      # fires — those are explicit disables.
      - pattern-not-regex: 'StorageEncrypted:\s*\w+\.Bool\(true\)'
      - pattern-not-regex: 'StorageEncrypted:\s*true\b'
      - pattern-not-regex: 'StorageEncrypted:\s*\w+\.Bool\(lo\.FromPtr\([^()\n]+\)\)'
    paths:
      include:
        - "**/*.go"
      exclude:
        - "**/*_test.go"
    metadata:
      category: security
      cwe: "CWE-311: Missing Encryption of Sensitive Data"
      cis: "AWS Foundations RDS.3"

  # ====================================================================
  # 7. fmt.Errorf with `%v` instead of `%w` for an error — loses the
  #    wrap chain that `errors.Is` / `errors.As` rely on. Go 1.13+
  #    idiom is `%w`. Detection heuristic: the format string ENDS in
  #    `%v` (so it's the rightmost verb) AND the corresponding arg's
  #    name looks like an error variable.
  # ====================================================================
  - id: go-fmt-errorf-percent-v-for-error
    languages: [go]
    severity: WARNING
    message: >-
      Use `%w` to wrap an error in `fmt.Errorf` (Go 1.13+). `%v`
      formats the error's text but DROPS the wrap chain — `errors.Is`
      and `errors.As` then cannot unwrap to the original sentinel or
      typed error. Replace `fmt.Errorf("...%v", err)` with
      `fmt.Errorf("...%w", err)`.
    patterns:
      - pattern-either:
          - pattern: fmt.Errorf($S, $E)
          - pattern: fmt.Errorf($S, $A, $E)
          - pattern: fmt.Errorf($S, $A, $B, $E)
      - metavariable-regex:
          metavariable: $S
          regex: '^"[^"]*%v"$'
      - metavariable-regex:
          metavariable: $E
          regex: '^[a-zA-Z_]*[Ee]rr(or)?$'
    paths:
      include:
        - "**/*.go"
    metadata:
      category: best-practice
      reference: "https://go.dev/blog/go1.13-errors"
