rules:
  # ====================================================================
  # 1. Script injection via github.event context. Single-line `run:` and
  #    multi-line `run: |` block scalars. The block-scalar variant uses an
  #    indentation backreference so it cannot cross into the next step
  #    (which would have less indentation than the body lines).
  # ====================================================================
  - id: gha-script-injection-via-github-event
    languages: [yaml]
    severity: ERROR
    message: >-
      Direct interpolation of `${{ github.event.* }}` into a `run:` block
      lets an attacker inject shell via PR title / branch name / commit
      message / etc. Read the value through an `env:` mapping in the same
      step and reference the env var inside the script:
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE"
    pattern-either:
      # Single-line: `run: foo ${{ github.event.X }}` (with or without leading `- `).
      - pattern-regex: '(?m)^[ \t]+(?:- )?run:[ \t]+[^|>\n][^\n]*\$\{\{[^}]*github\.event\.[^}]+\}\}'
      # Multi-line `run: |` block. Body lines AND the final interpolation
      # line both exclude lines that begin a sibling step (`[ \t]+- `), so
      # the match cannot leak into the next step's `env:`/`name:` content
      # (the latter was a residual gap noted in the second-pass review).
      - pattern-regex: '(?ms)^[ \t]+(?:- )?run:[ \t]*[|>][^\n]*\n((?:(?![ \t]+- )[^\n]*\n){0,30}?)(?![ \t]+- )[^\n]*\$\{\{[^}]*github\.event\.[^}]+\}\}'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
        - "**/action.yml"
        - "**/action.yaml"
    metadata:
      category: security
      cwe: "CWE-78: OS Command Injection"
      reference: "https://securitylab.github.com/research/github-actions-untrusted-input/"

  # ====================================================================
  # 2. Same — for any other attacker-controlled context.
  # ====================================================================
  - id: gha-script-injection-via-attacker-controlled-context
    languages: [yaml]
    severity: ERROR
    message: >-
      Attacker-controlled values (`github.head_ref`, head commit message,
      issue/PR title/body, comment/review body, workflow_run head fields,
      reusable-workflow `inputs.*`) must not be interpolated into a `run:`
      block. Pass them through `env:` and quote on use.
    pattern-either:
      - pattern-regex: '(?m)^[ \t]+(?:- )?run:[ \t]+[^|>\n][^\n]*\$\{\{[^}]*(github\.head_ref|head_commit\.message|issue\.title|issue\.body|comment\.body|review\.body|pull_request\.body|pull_request\.title|pull_request\.head\.ref|pull_request\.head\.label|workflow_run\.head_branch|workflow_run\.head_commit\.message|github\.ref_name|inputs\.)[^}]*\}\}'
      - pattern-regex: '(?ms)^[ \t]+(?:- )?run:[ \t]*[|>][^\n]*\n((?:(?![ \t]+- )[^\n]*\n){0,30}?)(?![ \t]+- )[^\n]*\$\{\{[^}]*(github\.head_ref|head_commit\.message|issue\.title|issue\.body|comment\.body|review\.body|pull_request\.body|pull_request\.title|pull_request\.head\.ref|pull_request\.head\.label|workflow_run\.head_branch|workflow_run\.head_commit\.message|github\.ref_name|inputs\.)[^}]*\}\}'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
        - "**/action.yml"
        - "**/action.yaml"
    metadata:
      category: security

  # ====================================================================
  # 3. pull_request_target with checkout of PR head — classic pwn-request.
  # ====================================================================
  - id: gha-pull-request-target-with-pr-head-checkout
    languages: [yaml]
    severity: ERROR
    message: >-
      `pull_request_target` runs with secrets and write-scope tokens. If
      the workflow then `actions/checkout`s the PR head ref, attacker code
      runs with full privileges. Use `pull_request` for PR scanning, or
      split into a scan job (pull_request) + a privileged comment/upload
      job (workflow_run).
    pattern-regex: '(?s)\bpull_request_target\b[\s\S]{0,8000}?actions/checkout@[\s\S]{0,500}?ref:[ \t]*[^\n]*(github\.event\.pull_request\.head\.(sha|ref)|github\.head_ref|github\.event\.workflow_run\.head_sha)'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
    metadata:
      category: security
      reference: "https://securitylab.github.com/research/github-actions-preventing-pwn-requests/"

  # ====================================================================
  # 4. Unpinned third-party action (not actions/ * and not pinned @SHA).
  #    Catches both unquoted and quoted `uses:` forms.
  # ====================================================================
  - id: gha-unpinned-third-party-action
    languages: [yaml]
    severity: WARNING
    message: >-
      Third-party actions must be pinned by a 40-char commit SHA, not a
      mutable tag. A compromised tag (cf. `tj-actions/changed-files` 2025)
      lets an attacker steal your workflow's secrets. Replace
      `uses: foo/bar@vN` with `uses: foo/bar@<sha>  # vN`.
    pattern-regex: 'uses:\s+["'']?(?!actions/|github/|simple-container-com/|\./)[A-Za-z0-9._-]+/[^@\s"'']+@(?![0-9a-f]{40}\b)[^"''\s]+'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
        - "**/action.yml"
        - "**/action.yaml"
    metadata:
      category: security
      cwe: "CWE-1357: Reliance on Insufficiently Trustworthy Component"

  # ====================================================================
  # 5. First-party `actions/*` should also be pinned by SHA.
  # ====================================================================
  - id: gha-unpinned-first-party-action
    languages: [yaml]
    severity: INFO
    message: >-
      Pin first-party `actions/*` by 40-char commit SHA — defence-in-depth.
    pattern-regex: 'uses:\s+["'']?actions/[^@\s"'']+@(?![0-9a-f]{40}\b)[^"''\s]+'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
        - "**/action.yml"
        - "**/action.yaml"
    metadata:
      category: best-practice

  # ====================================================================
  # 6. permissions: write-all — never appropriate. Catches quoted variants.
  # ====================================================================
  - id: gha-permissions-write-all
    languages: [yaml]
    severity: ERROR
    message: >-
      `permissions: write-all` grants the workflow full write to every
      scope, defeating the principle of least privilege. List only the
      scopes the workflow actually needs.
    pattern-regex: '^\s*permissions:\s+["'']?write-all["'']?\s*(#.*)?$'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
    metadata:
      category: security
      cwe: "CWE-272: Least Privilege Violation"

  # ====================================================================
  # 7. Explicit `persist-credentials: true` on actions/checkout. Scoped to
  #    actions/checkout AND step-bounded: the body lines we scan after the
  #    `uses: actions/checkout` line must NOT begin a sibling step
  #    (`[ \t]+- `), so the rule cannot reach into a following unrelated
  #    action that happens to take a similarly-named input.
  #    Catches lowercase `true`, capitalised `True`, and quoted `"true"` /
  #    `'true'`.
  # ====================================================================
  - id: gha-checkout-persist-credentials-true
    languages: [yaml]
    severity: ERROR
    message: >-
      `actions/checkout` with `persist-credentials: true` writes the
      GITHUB_TOKEN into `.git/config`. Any later step (build, test) can
      read it. Set to `false` unless a later step explicitly needs to
      `git push` and you accept the risk.
    pattern-regex: '(?ms)uses:\s+["'']?actions/checkout@[^\n]*\n(?:(?![ \t]+- )[ \t]+[^\n]*\n){0,30}?[ \t]+persist-credentials:[ \t]+["'']?[Tt]rue["'']?'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
        - "**/action.yml"
        - "**/action.yaml"
    metadata:
      category: security

  # ====================================================================
  # 8. Self-hosted runner usage. Catches single-string, inline-list, and
  #    block-list forms.
  # ====================================================================
  - id: gha-self-hosted-runner
    languages: [yaml]
    severity: WARNING
    message: >-
      `runs-on: self-hosted` lets PR code execute on org-controlled
      hardware. If this workflow runs on `pull_request` (not _target) and
      the runner is shared, an attacker can persist or pivot. Prefer
      ubuntu-* GitHub-hosted unless the runner is single-use ephemeral.
    pattern-either:
      - pattern-regex: '^\s*runs-on:\s+["'']?self-hosted["'']?\s*(#.*)?$'
      - pattern-regex: '^\s*runs-on:\s*\[[^\]]*\bself-hosted\b[^\]]*\]'
      - pattern-regex: '(?m)^\s*runs-on:\s*\n(?:\s*-\s+[^\n]+\n)*\s*-\s+["'']?self-hosted["'']?\s*$'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
    metadata:
      category: security

  # ====================================================================
  # 9. Secret printed to a file/log. Catches echo/printf/tee/heredoc forms.
  # ====================================================================
  - id: gha-secret-echoed
    languages: [yaml]
    severity: ERROR
    message: >-
      Logging or piping a secret value writes it into the workflow log
      (GitHub redaction is best-effort; multi-line / base64 / split values
      leak). Don't do this. Pass via `env:` and consume the env var only
      where strictly required.
    pattern-either:
      - pattern-regex: '\b(echo|printf|tee|cat\s*<<<|>)\s+[^\n]*\$\{\{\s*secrets\.'
      - pattern-regex: '<<\s*[A-Za-z_][A-Za-z0-9_]*\s*\n[^\n]*\$\{\{\s*secrets\.'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
        - "**/action.yml"
        - "**/action.yaml"
    metadata:
      category: security

  # ====================================================================
  # 10. (NEW) actions/cache key sourced from attacker-controlled context.
  # ====================================================================
  - id: gha-cache-key-attacker-controlled
    languages: [yaml]
    severity: ERROR
    message: >-
      Using `${{ github.head_ref }}`, PR title/body, `inputs.*`, or any
      `workflow_run.head_*` field as part of an `actions/cache` key lets
      an attacker poison the cache or steal cached artifacts on legitimate
      PRs. Use trusted keys: `github.sha`, hashed lockfiles, or a static
      version string.
    pattern-regex: '(?s)uses:\s+["'']?actions/cache[^\n]*\n[ \t]+with:\s*(\n[ \t]+[^\n]*)*?(key|restore-keys):\s*[^\n]*\$\{\{[^}]*(github\.head_ref|pull_request\.title|pull_request\.body|issue\.title|issue\.body|comment\.body|workflow_run\.head_branch|workflow_run\.head_commit|inputs\.)[^}]*\}\}'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
    metadata:
      category: security

  # ====================================================================
  # 11. (NEW) `continue-on-error: true` on a security-gate job.
  # ====================================================================
  - id: gha-security-job-continue-on-error
    languages: [yaml]
    severity: ERROR
    message: >-
      `continue-on-error: true` on a security-gating job (semgrep,
      trufflehog, sbom, security, scan, lint, …) silently turns failures
      into successes. Remove it or scope it to a non-gating step.
    pattern-regex: '(?im)^[ \t]+(secret-scan|sbom-scan|semgrep|semgrep-scan|trufflehog[a-z-]*|security[a-z-]*|scan[a-z-]*)[a-z0-9-]*:\s*\n(?:[ \t]+[^\n]*\n)*?[ \t]+continue-on-error:\s*["'']?true["'']?'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
    metadata:
      category: security

  # ====================================================================
  # 12. (NEW) `workflow_run`-triggered job that checks out the head SHA.
  #     This re-introduces the pwn-request risk on the privileged side.
  # ====================================================================
  - id: gha-workflow-run-checkout-head-sha
    languages: [yaml]
    severity: ERROR
    message: >-
      Privileged `workflow_run` workflows must NOT checkout the head SHA
      of the upstream run. The whole point of the workflow_run split is
      that the privileged side never executes PR code. If you need files
      from the head, download them via the `download-artifact` action
      (artifact contents are still untrusted, but at least no execution).
    pattern-regex: '(?s)workflow_run:.*?actions/checkout[^\n]*\n[ \t]+with:\s*(\n[ \t]+[^\n]*)*?ref:\s*[^\n]*(workflow_run\.head_sha|workflow_run\.head_branch|workflow_run\.head_commit\.id)'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
    metadata:
      category: security

  # ====================================================================
  # 14. (NEW) Reusable workflow self-call — easy way to recurse / DoS.
  # ====================================================================
  - id: gha-reusable-workflow-self-call
    languages: [yaml]
    severity: WARNING
    message: >-
      A `uses:` referencing the SAME workflow file is almost always a
      mistake — at best wasted compute, at worst infinite recursion.
    pattern-regex: 'uses:\s+["'']?\./\.github/workflows/'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
    metadata:
      category: bug

  # ====================================================================
  # 15. (NEW) `if: false` / `if: ${{ false }}` permanent-skip on a
  #     security-named job. Easy way to "soft-disable" a gate without
  #     anyone noticing in review.
  # ====================================================================
  - id: gha-security-job-permanently-disabled
    languages: [yaml]
    severity: ERROR
    message: >-
      `if: false` (or `if: ${{ false }}`) on a security-named job
      permanently skips the gate. If the job is genuinely deprecated,
      delete it; don't leave a disabled stub.
    pattern-regex: '(?im)^[ \t]+(secret-scan|sbom-scan|semgrep|semgrep-scan|trufflehog[a-z-]*|security[a-z-]*|scan[a-z-]*|status)[a-z0-9-]*:\s*\n(?:[ \t]+[^\n]*\n)*?[ \t]+if:\s*(\$\{\{\s*)?false(\s*\}\})?'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
    metadata:
      category: security

  # ====================================================================
  # 16. (NEW) Privileged comment-poster step that reads `body` from an
  #     artifact-supplied path WITHOUT going through `gh api --input -`
  #     or `jq --rawfile`. Mostly to enforce our own pattern.
  # ====================================================================
  - id: gha-comment-body-via-argv
    languages: [yaml]
    severity: WARNING
    message: >-
      When posting a comment from an artifact-rendered file, prefer
      `jq -n --rawfile body "$F" '{body:$body}' | gh api ... --input -`
      over `gh ... --body "$BODY"` / `-f body="$BODY"`. The argv form
      hits length limits at MB-scale bodies and double-escapes weird
      characters.
    pattern-regex: 'gh\s+(api|pr|issue)\s+[^\n]*--body[\s=][^\n]*\$\(?cat'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
        - "**/*.sh"
        - "**/*.bash"
    metadata:
      category: best-practice

  # ====================================================================
  # 16. `pull_request` workflow that touches a non-GITHUB_TOKEN secret —
  #     PPE / CICD-SEC-4. `pull_request` runs with secrets exposed to PR
  #     code (incl. fork PRs once the maintainer approves the first run).
  #     Any `secrets.X` reference other than the auto-issued GITHUB_TOKEN
  #     is exfiltratable. Split into a secret-less PR scan job +
  #     workflow_run-triggered privileged comment job.
  #
  #     Anchors `pull_request` (not `_target`) and any `secrets.*` use,
  #     either order in the file. Whole-file regex.
  # ====================================================================
  - id: gha-pull-request-uses-non-token-secret
    languages: [yaml]
    severity: ERROR
    message: >-
      This workflow triggers on `pull_request` AND references a non-
      GITHUB_TOKEN secret. Any contributor who can open a PR can exfil
      that secret (CICD-SEC-4). Move secret-using steps to a `push` /
      `workflow_dispatch` / `workflow_run` job; keep the PR-triggered
      job read-only.
    pattern-either:
      # `pull_request` first, then secret.
      - pattern-regex: '(?ms)^on:[\s\S]{0,4000}?\bpull_request(?![_-]target)\b[\s\S]{1,30000}?\$\{\{\s*secrets\.(?!(?:GITHUB_TOKEN|github_token)\s*\}\})[A-Za-z_][A-Za-z0-9_]*\s*\}\}'
      # Secret first, then `pull_request` (rare — `on:` near top is normal but defenders can be tidy).
      - pattern-regex: '(?ms)\$\{\{\s*secrets\.(?!(?:GITHUB_TOKEN|github_token)\s*\}\})[A-Za-z_][A-Za-z0-9_]*\s*\}\}[\s\S]{1,30000}?^on:[\s\S]{0,4000}?\bpull_request(?![_-]target)\b'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
    metadata:
      category: security
      cwe: "CWE-538: Insertion of Sensitive Information into Externally-Accessible File or Directory"
      reference: "https://owasp.org/www-project-top-10-ci-cd-security-risks/CICD-SEC-04"

  # ====================================================================
  # 17. BuildKit privileged entitlement at build time. `security.insecure`
  #     gives RUN steps CAP_SYS_ADMIN + write access to the host kernel
  #     interfaces; `network.host` shares the host network namespace.
  #     Both let a malicious dep escape the build sandbox. Removing them
  #     is the default; needing one is a strong code-smell.
  # ====================================================================
  - id: gha-buildkit-insecure-entitlement
    languages: [yaml]
    severity: ERROR
    message: >-
      `--allow-insecure-entitlement <security.insecure|network.host>`
      grants build-time RUN steps near-host privileges. A malicious dep
      pulled during build can pivot to the runner. Remove the flag;
      restructure the Dockerfile if a build step truly needs it.
    pattern-regex: '--allow-insecure-entitlement\s+(security\.insecure|network\.host)'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
        - "**/action.yml"
        - "**/action.yaml"
    metadata:
      category: security
      cwe: "CWE-269: Improper Privilege Management"
      reference: "https://docs.docker.com/build/buildkit/configure/#allow-insecure-entitlements"

  # ====================================================================
  # 18. Token interpolation inside a URL's userinfo segment — leaks the
  #     token into git's reflog, process listing (ps), build logs, and
  #     any HTTP redirect target. Use git's `extraheader` config or
  #     env-var-only auth instead.
  # ====================================================================
  - id: gha-github-token-in-url
    languages: [yaml]
    severity: ERROR
    message: >-
      Embedding `${{ secrets.*TOKEN* }}` between `://` and `@` writes
      the token into command-line args, git remote config, and any
      redirected URL. Replace with `git -c http.extraheader="AUTHORIZATION: bearer $TOKEN"`
      or rely on `actions/checkout`'s persisted credentials for git ops.
    pattern-regex: '://[A-Za-z0-9_:.\-]*\$\{\{\s*secrets\.[A-Za-z_][A-Za-z0-9_]*(?:TOKEN|token|PAT|pat)[A-Za-z0-9_]*\s*\}\}@'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
        - "**/action.yml"
        - "**/action.yaml"
    metadata:
      category: security
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"

  # ====================================================================
  # 19. `actions/checkout` step that omits `persist-credentials:`. The
  #     default is `true` — token gets written into `.git/config` for
  #     every later step in the job. Complement to rule #7
  #     (`gha-checkout-persist-credentials-true`, fires on the explicit-
  #     true form). This rule fires when the safe form is silently
  #     omitted.
  #
  #     Implementation: match the checkout `uses:` line, then walk body
  #     lines (each indented deeper than `- ` and not starting a sibling
  #     step). The repeat ends as soon as ANY body line mentions
  #     `persist-credentials:` (so explicit true / false suppresses the
  #     match). For the rule to fire, the post-loop position must be a
  #     sibling step or EOF — i.e., we walked the whole step body without
  #     ever seeing `persist-credentials:`.
  # ====================================================================
  - id: gha-checkout-missing-persist-credentials-false
    languages: [yaml]
    severity: WARNING
    message: >-
      `actions/checkout` defaults to `persist-credentials: true`, which
      writes GITHUB_TOKEN into `.git/config` for every later step. Set
      `persist-credentials: false` explicitly unless a later step in the
      same job needs to `git push` and you accept the risk.
    pattern-regex: '(?ms)uses:\s+["'']?actions/checkout@[^\n]*(?:\n(?![ \t]+- )(?![ \t]+persist-credentials:)(?:[ \t]+[^\n]*|[ \t]*)){0,30}(?=\n[ \t]+- |\Z)'
    paths:
      include:
        - "**/.github/workflows/*.yml"
        - "**/.github/workflows/*.yaml"
        - "**/action.yml"
        - "**/action.yaml"
    metadata:
      category: security
      cwe: "CWE-538: Insertion of Sensitive Information into Externally-Accessible File or Directory"
