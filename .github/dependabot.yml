# Dependabot — simple-container-com/actions
#
# No language ecosystems live here (composite actions + reusable workflows
# only), so there is no security-only language stream. Two VERSION streams,
# matching the PAY-SPACE org rollout:
#
#   docker          — FROM pins in versions/Dockerfile, the single catalogue
#     of every tool image run via `docker run`. Dependabot only sees this
#     file (not the image:tag@sha256 pins inside shell / action.yml). A FROM
#     bump fails `tool-version-sync` until `tools/sync-tool-versions.sh
#     --apply` propagates the new pin on the PR branch; `rebase-strategy:
#     disabled` stops that follow-up commit being silently rebased away.
#
#   github-actions  — `actions/*` SHAs in our reusable workflows + composite
#     actions. Tracks security advisories too (supply-chain risk).
#
# Both ecosystems are single-rooted, so `directory:` is used rather than the
# multi-module `directories:` form.

version: 2
updates:
  # ── Docker: VERSION only ────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /versions
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    rebase-strategy: disabled            # keep the tool-version-sync commit
    commit-message:
      prefix: "chore(docker)"
    labels:
      - dependencies
      - docker
    groups:
      docker:                            # majors fall outside ⇒ own PR each
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # ── GitHub Actions: SECURITY + VERSION ──────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      github-actions:                    # third-party majors ⇒ own PR each
        applies-to: version-updates
        update-types:
          - minor
          - patch
