name: Semgrep Comment (reusable)

# Companion to semgrep.yml. Triggered in consumer repos by `workflow_run`
# after the Semgrep workflow completes. Runs in the *base repo* context with
# `pull-requests: write`, so it can post comments on fork PRs whose own scan
# ran with a read-only token.
#
# This workflow MUST NOT touch PR code. It only consumes the rendered comment
# artifact (pr-comment-body-semgrep) produced by build-semgrep-comment.

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  comment:
    name: Post Semgrep PR Comment
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion != 'cancelled'

    steps:
      - name: Post or update sticky PR comment
        uses: simple-container-com/actions/post-pr-comment@main
        with:
          workflow-run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          artifact-name: pr-comment-body-semgrep
          marker: '## Semgrep Scan Results'
