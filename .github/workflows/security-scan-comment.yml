name: Security Scan Comment (reusable)

# Companion to security-scan.yml. Triggered in consumer repos by `workflow_run`
# after the security-scan workflow completes. Runs in the *base repo* context
# with `pull-requests: write`, so it can post comments on fork-PRs whose own
# scan workflow ran with a read-only token.
#
# This workflow MUST NOT touch PR code. It only consumes the artifact (a
# pre-rendered markdown body) produced by build-pr-comment in the scan workflow.

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  comment:
    name: Post PR Comment
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion != 'cancelled'

    steps:
      - name: Post or update sticky PR comment
        uses: simple-container-com/actions/post-pr-comment@main
        with:
          workflow-run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
