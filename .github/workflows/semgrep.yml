name: Semgrep

# Self-scan: run our custom Semgrep rule set against this repo on every PR
# and on push to main. Also run the rule-validation suite (.semgrep/run-tests.sh)
# so that broken rules are caught before they merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep self-scan + rule tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Run rule-validation suite
        run: .semgrep/run-tests.sh
