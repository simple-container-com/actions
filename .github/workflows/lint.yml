name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: 'Run actionlint (with shellcheck on inline run blocks)'
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/repo:ro" \
            -w /repo \
            rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 \
            -color

  shellcheck:
    name: shellcheck (composite-action scripts)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Find and lint .sh scripts
        run: |
          set -euo pipefail
          # Use git ls-files so we only inspect tracked content; exclude
          # the test fixture which intentionally contains rule-violating
          # constructs.
          mapfile -t scripts < <(git ls-files '*.sh' '*.bash' \
            ':(exclude).semgrep/tests/*')
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo 'No shell scripts to lint.'
            exit 0
          fi
          printf '%s\n' "${scripts[@]}"
          docker run --rm \
            -v "$PWD:/mnt:ro" \
            -w /mnt \
            koalaman/shellcheck:v0.11.0@sha256:61862eba1fcf09a484ebcc6feea46f1782532571a34ed51fedf90dd25f925a8d \
            --severity=warning \
            --color=always \
            "${scripts[@]}"
