name: Bump SELF-REF SHAs

# Closes the SELF-REF recursion loop. When sc-image-release.yml (or any
# future workflow / composite) references a sibling action of this same
# repo by SHA, that SHA is annotated with a `# SELF-REF` trailing
# comment. This workflow runs on push-to-main, invokes
# `scripts/bump-self-refs.py` to rewrite each marker's SHA to the
# just-merged commit, and opens (or refreshes) a PR for a maintainer to
# merge. See the script's docstring for the full design.
#
# Loop avoidance — two complementary defences:
#
#   1. `paths:` filter (below). The workflow only fires when a file
#      inside a SELF-REF target directory changes. The chore(self-refs)
#      PR's own merge commit touches only `.github/workflows/sc-image-
#      release.yml` (the file holding the SELF-REF lines being
#      rewritten) and possibly other `.github/workflows/*.yml` — NOT
#      the action.yml files under setup-sc-tooling/ etc. — so the
#      merge commit does NOT re-trigger this workflow.
#
#   2. `contains('chore(self-refs):')` guard on the head-commit
#      message. Belt-and-braces against an edge case where someone
#      restructures the repo so a chore-merge commit also touches a
#      SELF-REF target path. `contains` (not `startsWith`) catches the
#      marker in either the title (squash-merge) or body (merge-commit
#      style — the actions repo uses merge-commit style).

on:
  push:
    branches: [main]
    paths:
      # Composite actions referenced via SELF-REF markers.
      - 'setup-sc-tooling/**'
      - 'sign-and-attest/**'
      - 'install-sc/**'
      - 'install-welder/**'
      - 'install-attest-tools/**'
      - 'notify-telegram/**'
      # The bump-self-refs workflow + script themselves — so a change
      # to the bump logic is exercised on the next merge.
      - '.github/workflows/bump-self-refs.yml'
      - 'scripts/bump-self-refs.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump:
    name: Bump SELF-REF SHAs
    runs-on: ubuntu-24.04
    if: ${{ !contains(github.event.head_commit.message, 'chore(self-refs):') }}
    permissions:
      contents: write       # push the auto-bump branch
      pull-requests: write  # open the PR
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Bump SELF-REF SHAs + open chore PR
        env:
          NEW_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/bump-self-refs.py
