name: Security Scan (reusable)

# Reusable security-scan workflow for the simple-container-com org.
#
# Designed for use in PUBLIC consumer repos that may receive PRs from forks.
# This workflow runs untrusted PR code only as inert input to scanners
# (TruffleHog, Syft, Trivy, Grype) — it never builds, installs, or executes it.
# It runs under `pull_request` (not `pull_request_target`) so fork PRs receive
# a read-only token and no access to org secrets.
#
# Comment posting is split into security-scan-comment.yml, triggered via
# workflow_run, so privileged token use never touches PR code.
#
# All non-trivial logic lives in composite actions colocated in this repo.

on:
  workflow_call:
    inputs:
      product-name:
        description: 'Product name for reporting. Defaults to calling repository name.'
        required: false
        default: ''
        type: string
      fail-on-secrets:
        description: 'Fail the workflow if secrets are detected by TruffleHog'
        required: false
        default: true
        type: boolean
      enable-sbom:
        description: |
          Run the SBOM (Syft) + dependency scan (Trivy + Grype) job. Default
          true. Set false for repos that have no source-tree dependency
          manifests (e.g. `package.json`, `go.mod`, `Cargo.toml`,
          `requirements.txt`) — Syft would produce a near-empty SBOM and the
          downstream Trivy/Grype scans add nothing over the GitHub-side
          Dependabot coverage of `github-actions` and `docker` ecosystems.
          When false, the SBOM job is skipped, the comment renders an
          "SBOM: skipped" row, and the status gate ignores the SBOM result.
        required: false
        default: true
        type: boolean
      secret-scan-extra-excludes:
        description: |
          Additional path patterns (one Go regex per line) appended to
          TruffleHog's --exclude-paths file, beyond the built-in
          `\.sc/secrets\.yaml` and `\.sc/stacks/[^/]+/secrets\.yaml`.
          TruffleHog uses Go regex (NOT glob), substring-matched against
          the full container path. Use only as a last resort for fixtures
          whose format must remain intact (e.g. raw OpenSSH key bodies);
          prefer source-level placeholder replacement or inline
          `trufflehog:ignore` comments when the file format permits.
          Lines containing shell-control characters or control bytes are
          rejected.
        required: false
        default: ''
        type: string
      vex-files:
        description: |
          Optional whitespace-separated list of OpenVEX 0.2.0 documents
          (paths relative to the consumer repo root) to pass to both
          Trivy and Grype during the SBOM scan. Statements with
          `status: not_affected` or `status: fixed` matching the SBOM's
          components are suppressed at the scanner — no `.trivyignore`,
          no DefectDojo-side ignore rules. Empty (default) → the SBOM
          job auto-discovers any `.sc/vex/*.openvex.json` files in the
          consumer checkout and uses those. Pass a single path or
          space-separated list to override the discovery. Missing files
          are skipped with a non-fatal warning so a stale input cannot
          break unrelated PRs. See the consumer-side `.sc/vex/README.md`
          for the per-scanner shape gotchas (dual product shape +
          CVE/GHSA dual-keyed statements).
        required: false
        default: ''
        type: string

concurrency:
  group: security-scan-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-24.04
    outputs:
      findings-count: ${{ steps.scan.outputs.findings-count }}
      has-findings: ${{ steps.scan.outputs.has-findings }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: TruffleHog scan
        id: scan
        uses: simple-container-com/actions/trufflehog-scan@main
        with:
          extra-excludes: ${{ inputs.secret-scan-extra-excludes }}

  sbom-scan:
    name: SBOM + Dependency Scan
    runs-on: ubuntu-24.04
    if: ${{ inputs.enable-sbom }}
    outputs:
      component-count: ${{ steps.sbom.outputs.component-count }}
      trivy-total: ${{ steps.scan.outputs.trivy-total }}
      trivy-critical: ${{ steps.scan.outputs.trivy-critical }}
      trivy-high: ${{ steps.scan.outputs.trivy-high }}
      trivy-medium: ${{ steps.scan.outputs.trivy-medium }}
      trivy-low: ${{ steps.scan.outputs.trivy-low }}
      trivy-unknown: ${{ steps.scan.outputs.trivy-unknown }}
      grype-total: ${{ steps.scan.outputs.grype-total }}
      grype-critical: ${{ steps.scan.outputs.grype-critical }}
      grype-high: ${{ steps.scan.outputs.grype-high }}
      grype-medium: ${{ steps.scan.outputs.grype-medium }}
      grype-low: ${{ steps.scan.outputs.grype-low }}
      grype-unknown: ${{ steps.scan.outputs.grype-unknown }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: SBOM generate
        id: sbom
        uses: simple-container-com/actions/sbom-generate@main

      # Discover OpenVEX documents to thread into Trivy + Grype.
      # If the caller passed `vex-files` explicitly, honour that verbatim
      # (paths reach the action through env, never inlined into `run:`).
      # Otherwise auto-discover `.sc/vex/*.openvex.json` in the consumer
      # checkout. Empty result → both scanners run unchanged (no-op).
      - name: Discover OpenVEX documents
        id: vex
        shell: bash
        env:
          INPUT_VEX_FILES: ${{ inputs.vex-files }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VEX_FILES:-}" ]; then
            echo "Using caller-provided vex-files input."
            VEX_LIST="$INPUT_VEX_FILES"
          elif compgen -G '.sc/vex/*.openvex.json' > /dev/null; then
            # Use NUL-terminated find + tr to whitespace so filenames with
            # exotic characters can't break the for-loop downstream.
            VEX_LIST=$(printf '%s\n' .sc/vex/*.openvex.json | tr '\n' ' ')
            echo "Auto-discovered OpenVEX docs under .sc/vex/: $VEX_LIST"
          else
            echo "No OpenVEX documents in .sc/vex/ — scanners will run without --vex."
            VEX_LIST=""
          fi
          # Resolve relative paths to absolute (relative to the consumer
          # checkout root, which is the workflow's current working dir).
          ABS_LIST=""
          for p in $VEX_LIST; do
            if [ -f "$p" ]; then
              abs="$(cd "$(dirname -- "$p")" && pwd)/$(basename -- "$p")"
              ABS_LIST+="$abs "
            else
              echo "::warning::VEX file declared but missing on disk: $p"
            fi
          done
          # Trim trailing space (cosmetic) and emit single-line output.
          ABS_LIST="${ABS_LIST% }"
          echo "vex-files=$ABS_LIST" >> "$GITHUB_OUTPUT"

      - name: SBOM vulnerability scan
        id: scan
        uses: simple-container-com/actions/sbom-scan@main
        with:
          sbom-file: ${{ steps.sbom.outputs.sbom-file }}
          vex-files: ${{ steps.vex.outputs.vex-files }}

  build-comment:
    name: Build PR Comment Body
    runs-on: ubuntu-24.04
    needs: [secret-scan, sbom-scan]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Build comment body
        uses: simple-container-com/actions/build-pr-comment@main
        with:
          product-name: ${{ inputs.product-name }}
          secret-scan-result: ${{ needs.secret-scan.result }}
          secret-has-findings: ${{ needs.secret-scan.outputs.has-findings }}
          secret-findings-count: ${{ needs.secret-scan.outputs.findings-count }}
          sbom-result: ${{ needs.sbom-scan.result }}
          sbom-component-count: ${{ needs.sbom-scan.outputs.component-count }}
          trivy-critical: ${{ needs.sbom-scan.outputs.trivy-critical }}
          trivy-high: ${{ needs.sbom-scan.outputs.trivy-high }}
          trivy-total: ${{ needs.sbom-scan.outputs.trivy-total }}
          grype-critical: ${{ needs.sbom-scan.outputs.grype-critical }}
          grype-high: ${{ needs.sbom-scan.outputs.grype-high }}
          grype-total: ${{ needs.sbom-scan.outputs.grype-total }}

  status:
    name: Security Status
    runs-on: ubuntu-24.04
    needs: [secret-scan, sbom-scan]
    # `!cancelled()` lets Status run after the scans completed
    # (success/failure) but SKIPS it when the upstream scans were
    # cancelled — which in practice means the whole workflow run was
    # superseded by concurrency (a newer event for the same SHA).
    # A skipped Status produces a NEUTRAL check_run, which branch
    # protection treats as not-failing; the surviving run's Status
    # reports SUCCESS and gates the merge.
    #
    # Before this change: `if: always()` made Status run even on
    # upstream cancellation, evaluate `result=cancelled` as a hard
    # error, and emit a FAILURE check_run that blocked the PR even
    # though the parallel non-cancelled run was clean.
    #
    # The original concern (a fork PR cancelling its own scan to
    # bypass coverage) is mitigated separately: fork PRs do not
    # receive secrets, the security-relevant scans are read-only,
    # and a maintainer reviewing the PR would still see the
    # cancellation in the check-rollup before merging.
    if: ${{ !cancelled() }}

    steps:
      - name: Evaluate security results
        env:
          FAIL_ON_SECRETS: ${{ inputs.fail-on-secrets }}
          ENABLE_SBOM: ${{ inputs.enable-sbom }}
          SECRET_RESULT: ${{ needs.secret-scan.result }}
          SECRET_HAS_FINDINGS: ${{ needs.secret-scan.outputs.has-findings }}
          SECRET_FINDINGS_COUNT: ${{ needs.secret-scan.outputs.findings-count }}
          SBOM_RESULT: ${{ needs.sbom-scan.result }}
        run: |
          set -euo pipefail
          failed='false'

          # Required scan jobs must explicitly succeed. `cancelled` and
          # `skipped` results count as failure too — otherwise a fork PR
          # that times out / is cancelled mid-flight could merge without
          # ever being scanned.
          if [ "${SECRET_RESULT}" != 'success' ]; then
            echo "::error::Secret scan job did not succeed (result=${SECRET_RESULT})."
            failed='true'
          fi
          # The SBOM/dep scan is only required when the caller asked for it.
          # When `enable-sbom` is false the job is intentionally skipped, so
          # `SBOM_RESULT=skipped` is the expected result, not a failure.
          if [ "${ENABLE_SBOM}" = 'true' ] && [ "${SBOM_RESULT}" != 'success' ]; then
            echo "::error::SBOM/dependency scan job did not succeed (result=${SBOM_RESULT})."
            failed='true'
          fi

          if [ "${FAIL_ON_SECRETS}" = 'true' ] && [ "${SECRET_HAS_FINDINGS}" = 'true' ]; then
            echo "::error::TruffleHog detected ${SECRET_FINDINGS_COUNT} potential secret(s). Remove them before merging."
            failed='true'
          fi

          if [ "${failed}" = 'true' ]; then
            exit 1
          fi

          echo 'All security checks passed.'
